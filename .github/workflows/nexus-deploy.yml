name: Nexus Hermes Native Deployment
on: 
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/nexus-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup System Dependencies
      run: |
        echo -e "\e[35m╔════════════════════════════════════╗\e[0m"
        echo -e "\e[35m║   NEXUS HERMES NATIVE DEPLOY v2.6  ║\e[0m"
        echo -e "\e[35m╚════════════════════════════════════╝\e[0m"
        sudo apt-get update
        sudo apt-get install -y curl git ca-certificates ffmpeg openssl jq
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt-get install -y nodejs
        
    - name: Install Tunneling Protocol
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/keyrings/ngrok.asc >/dev/null
        echo "deb [signed-by=/etc/apt/keyrings/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok -y
        ngrok authtoken 3F8T4WIYCiM1Ho32W5P1HKHVFwC_2RaPYoXzHKJiQ9CiNTvcw
        
    - name: Setup Hermes Credentials
      run: |
        mkdir -p ~/.hermes
        chmod 755 ~/.hermes
        DASHBOARD_SECRET=$(openssl rand -base64 32)
        API_SERVER_KEY=$(openssl rand -hex 32)
        echo "API_SERVER_KEY=$API_SERVER_KEY" >> $GITHUB_ENV
        
        printf '%s\n' \
          "HERMES_DASHBOARD_BASIC_AUTH_USERNAME=Saturo" \
          "HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=Admin@123" \
          "HERMES_DASHBOARD_BASIC_AUTH_SECRET=$DASHBOARD_SECRET" \
          "API_SERVER_ENABLED=true" \
          "API_SERVER_HOST=0.0.0.0" \
          "API_SERVER_KEY=$API_SERVER_KEY" \
          "API_SERVER_CORS_ORIGINS=*" \
          "HERMES_DASHBOARD=1" \
          "HERMES_DASHBOARD_HOST=0.0.0.0" \
          "HERMES_DASHBOARD_PORT=9119" \
          > ~/.hermes/.env
        chmod 600 ~/.hermes/.env
        
    - name: Install Hermes Native
      run: |
        curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
        
    - name: Start Hermes Native Agent
      run: |
        export PATH="$HOME/.hermes/bin:$PATH"
        export $(grep -v '^#' ~/.hermes/.env | xargs)
        
        echo "Starting Hermes Dashboard..."
        nohup hermes dashboard --port 9119 --host 0.0.0.0 > /tmp/dash.log 2>&1 &
        sleep 5
        
    - name: Setup Web Terminal (ttyd & Nginx)
      run: |
        echo "Installing ttyd (Web Terminal)..."
        curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o ttyd
        chmod +x ttyd
        sudo mv ttyd /usr/local/bin/
        
        echo "Installing Nginx Reverse Proxy..."
        sudo apt-get install -y nginx
        
        echo "Configuring Nginx to route Dashboard (/) and Terminal (/terminal)..."
        cat << 'EOF' | sudo tee /etc/nginx/sites-available/default
        server {
            listen 8080;
            
            location /terminal {
                proxy_pass http://127.0.0.1:7681;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
            }
            
            location / {
                proxy_pass http://127.0.0.1:9119;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
            }
        }
        EOF
        sudo systemctl restart nginx
        
        echo "Starting ttyd on port 7681..."
        nohup ttyd -b /terminal -p 7681 -c "Saturo:Admin@123" bash > /tmp/ttyd.log 2>&1 &
        sleep 3
        
    - name: Start Assigned Tunnel
      run: |
        echo "Starting Ngrok tunnel on Port 8080..."
        nohup ngrok http 8080 --log=stdout > /tmp/tunnel.log 2>&1 &
        for i in $(seq 1 60); do
          sleep 2
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | grep -o '"public_url":"[^"]*"' | cut -d'"' -f4 | head -1 || true)
          if [ -n "$NGROK_URL" ]; then
            echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
            break
          fi
        done
        
    - name: Output Connection Details
      run: |
        echo -e "\e[32m[SUCCESS] Native Tunnel & Web Terminal Established!\e[0m"
        echo -e "\e[35m======================================\e[0m"
        echo -e "\e[35m    HERMES AGENT DASHBOARD ACCESS     \e[0m"
        echo -e "\e[35m======================================\e[0m"
        echo -e "\e[36mDashboard URL  : ${{ env.NGROK_URL }}\e[0m"
        echo -e "\e[36mTerminal URL   : ${{ env.NGROK_URL }}/terminal\e[0m"
        echo -e "\e[36mUsername       : Saturo\e[0m"
        echo -e "\e[36mPassword       : Admin@123\e[0m"
        echo -e "\e[36mAPI Key        : ${{ env.API_SERVER_KEY }}\e[0m"
        echo -e "\e[36mGateway Port   : 8642\e[0m"
        echo -e "\e[35m======================================\e[0m"
        
    - name: Keep Alive Monitor
      run: |
        echo "Hermes is active for 6 hours max..."
        for i in {360..1}; do
            sleep 60
        done